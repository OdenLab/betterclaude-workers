name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Wrangler config
        env:
          CLOUDFLARE_DOMAIN: ${{ secrets.CLOUDFLARE_DOMAIN }}
          CLOUDFLARE_ZONE_NAME: ${{ secrets.CLOUDFLARE_ZONE_NAME }}
        run: |
          set -e

          if [ -n "$CLOUDFLARE_DOMAIN" ] && [ -n "$CLOUDFLARE_ZONE_NAME" ]; then
            if grep -q "<YOUR_DOMAIN>" wrangler.jsonc || grep -q "<YOUR_ZONE>" wrangler.jsonc; then
              sed -i "s|<YOUR_DOMAIN>|$CLOUDFLARE_DOMAIN|g" wrangler.jsonc
              sed -i "s|<YOUR_ZONE>|$CLOUDFLARE_ZONE_NAME|g" wrangler.jsonc
              echo "Updated wrangler.jsonc routes from GitHub Secrets."
            else
              echo "wrangler.jsonc already contains real route values."
            fi
          else
            echo "CLOUDFLARE_DOMAIN / CLOUDFLARE_ZONE_NAME not provided; keeping wrangler.jsonc as-is."
          fi

      - name: Validate Wrangler configuration
        run: |
          set -e

          if grep -q "<YOUR_DOMAIN>" wrangler.jsonc || grep -q "<YOUR_ZONE>" wrangler.jsonc; then
            echo "::error::wrangler.jsonc still contains placeholder routes (<YOUR_DOMAIN>/<YOUR_ZONE>)."
            echo "::error::Set CLOUDFLARE_DOMAIN and CLOUDFLARE_ZONE_NAME repo secrets, or replace placeholders in wrangler.jsonc."
            exit 1
          fi

      - name: Deploy worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy
